<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昭燃的历史地图馆</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Zhi+Mang+Xing&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --bg-hover: #0f3460;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --border: rgba(255,255,255,0.1);
            --ink: #2c3e50;
        }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr 340px;
            height: 100vh;
            gap: 1px;
            background: var(--border);
        }

        /* 左侧时间轴 */
        .timeline-panel {
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 顶部馆名 */
        .museum-header {
            padding: 25px 20px;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.15) 0%, transparent 100%);
            border-bottom: 2px solid var(--gold);
            text-align: center;
            position: relative;
        }

        .museum-header::before,
        .museum-header::after {
            content: '❖';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .museum-header::before { left: 15px; }
        .museum-header::after { right: 15px; }

        .museum-title {
            font-family: "Zhi Mang Xing", cursive;
            font-size: 1.8rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .museum-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .quote-banner {
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid var(--gold);
            margin: 10px 15px;
            font-size: 0.8rem;
            color: var(--gold-light);
            font-style: italic;
            line-height: 1.6;
        }

        .quote-author {
            text-align: right;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .timeline-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .timeline-list::-webkit-scrollbar {
            width: 6px;
        }

        .timeline-list::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }

        .era-label {
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px;
            font-weight: 700;
            border-left: 3px solid var(--gold);
            background: rgba(212, 175, 55, 0.1);
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .era-quote {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: normal;
            font-style: italic;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            margin: 3px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border-left: 2px solid transparent;
        }

        .timeline-item:hover {
            background: var(--bg-hover);
            border-left-color: var(--gold);
        }

        .timeline-item.active {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.2), transparent);
            border-left-color: var(--gold);
        }

        .timeline-item.active .year-badge {
            background: var(--gold);
            color: var(--bg-dark);
        }

        .year-badge {
            min-width: 65px;
            padding: 5px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            margin-right: 10px;
            font-family: "Courier New", monospace;
            color: var(--gold-light);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .item-name {
            font-size: 0.85rem;
            line-height: 1.3;
            flex: 1;
            color: var(--text);
        }

        /* 中央地图区 */
        .map-panel {
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部名言栏 */
        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 30px;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-quote {
            text-align: center;
            color: var(--gold);
            font-size: 1rem;
            font-style: italic;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            max-width: 600px;
            line-height: 1.5;
        }

        .header-quote-author {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-style: normal;
        }

        .toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
            background: rgba(22, 33, 62, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--gold);
            backdrop-filter: blur(10px);
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
            transform: scale(1.1);
        }

        .map-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(233, 69, 96, 0.03) 0%, transparent 50%),
                linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.02) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(255,255,255,0.02) 50%, transparent 52%);
            background-size: 100% 100%, 100% 100%, 20px 20px, 20px 20px;
        }

        .map-viewport.grabbing {
            cursor: grabbing;
        }

        .map-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }

        .map-image {
            max-width: 80vw;
            max-height: 80vh;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            user-select: none;
            -webkit-user-drag: none;
            display: none;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .map-image.loaded {
            display: block;
        }

        .map-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
        }

        .placeholder-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .welcome-text {
            font-family: "Zhi Mang Xing", cursive;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .welcome-quote {
            font-size: 1rem;
            color: var(--text-muted);
            font-style: italic;
            max-width: 400px;
            line-height: 1.8;
        }

        .zoom-level {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--gold);
            font-family: "Courier New", monospace;
            border: 1px solid var(--gold);
        }

        /* 右侧信息面板 */
        .info-panel {
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .info-header {
            padding: 30px 25px;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .info-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25px;
            right: 25px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .current-year {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--gold);
            font-family: "Times New Roman", serif;
            line-height: 1;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .current-year.bc {
            color: var(--accent-light);
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        .current-title {
            font-size: 1.2rem;
            line-height: 1.5;
            color: var(--text);
            font-weight: 600;
        }

        .info-content {
            padding: 25px;
            flex: 1;
        }

        .info-section {
            margin-bottom: 25px;
            position: relative;
        }

        .section-title {
            font-size: 0.8rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .section-title::before {
            content: '';
            width: 20px;
            height: 2px;
            background: var(--gold);
        }

        .section-content {
            color: var(--text-muted);
            line-height: 1.9;
            font-size: 0.95rem;
            text-align: justify;
        }

        .wisdom-quote {
            background: rgba(212, 175, 55, 0.08);
            border-left: 3px solid var(--gold);
            padding: 15px 20px;
            margin: 15px 0;
            font-style: italic;
            color: var(--gold-light);
            line-height: 1.8;
            border-radius: 0 8px 8px 0;
        }

        .wisdom-author {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-style: normal;
        }

        .meta-list {
            display: grid;
            gap: 12px;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .meta-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .meta-value {
            color: var(--text);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .file-path-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            font-family: "Courier New", monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            word-break: break-all;
            border: 1px solid var(--gold);
            border-left-width: 3px;
            margin-top: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            padding: 20px 25px;
            border-top: 2px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .nav-btn {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
            letter-spacing: 2px;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: 700;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--text-muted);
            color: var(--text-muted);
        }

        /* 底部装饰 */
        .footer-quote {
            padding: 15px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-style: italic;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 260px 1fr 300px;
            }
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
            }
            .timeline-panel {
                max-height: 200px;
            }
            .info-panel {
                max-height: 300px;
            }
        }
    </style>

<body>
    <div class="container">
        <!-- 左侧时间轴 -->
        <div class="timeline-panel">
            <div class="museum-header">
                <div class="museum-title">昭燃的历史地图馆</div>
                <div class="museum-subtitle">以史为鉴 · 可以知兴替</div>
            </div>

            <div class="quote-banner" id="sidebarQuote">
                <div>"究天人之际，通古今之变"</div>
                <div class="quote-author">—— 司马迁《报任安书》</div>
            </div>

            <div class="timeline-list" id="timelineList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 中央地图区 -->
        <div class="map-panel">
            <div class="map-header">
                <div class="header-quote" id="headerQuote">
                    <div>"读史使人明智"</div>
                    <div class="header-quote-author">—— 弗朗西斯·培根</div>
                </div>
            </div>

            <div class="toolbar">
                <button class="tool-btn" onclick="zoomIn()" title="放大">+</button>
                <button class="tool-btn" onclick="zoomOut()" title="缩小">−</button>
                <button class="tool-btn" onclick="resetView()" title="重置">⟲</button>
                <button class="tool-btn" onclick="fitToScreen()" title="适应屏幕">⛶</button>
            </div>

            <div class="map-viewport" id="mapViewport">
                <div class="map-wrapper" id="mapWrapper">
                    <div class="map-placeholder" id="placeholder">
                        <div class="placeholder-icon">🗺️</div>
                        <div class="welcome-text">昭燃的历史地图馆</div>
                        <div class="welcome-quote">
                            "史者，所以明夫治天下之道也"
                            <br>
                            <span style="font-size: 0.9rem; opacity: 0.7;">—— 曾巩《南齐书序》</span>
                        </div>
                    </div>
                    <img class="map-image" id="mapImage" alt="历史地图">
                </div>
            </div>

            <div class="zoom-level" id="zoomLevel">100%</div>
        </div>

        <!-- 右侧信息面板 -->
        <div class="info-panel">
            <div class="info-header">
                <div class="current-year" id="currentYear">—</div>
                <div class="current-title" id="currentTitle">请选择地图开始探索</div>
            </div>

            <div class="info-content">
                <div class="info-section">
                    <div class="section-title">史家之言</div>
                    <div class="wisdom-quote" id="wisdomQuote">
                        "欲知大道，必先为史"
                        <div class="wisdom-author">—— 龚自珍</div>
                    </div>
                </div>

                <div class="info-section">
                    <div class="section-title">时期概述</div>
                    <div class="section-content" id="eraDesc">
                        从史前文明到现代中国，五十八幅历史地图串联起华夏文明的时空脉络。点击左侧时间轴，开启你的历史地理探索之旅。
                    </div>
                </div>

                <div class="info-section">
                    <div class="section-title">详细信息</div>
                    <div class="meta-list">
                        <div class="meta-item">
                            <span class="meta-label">历史时期</span>
                            <span class="meta-value" id="metaEra">—</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">时间跨度</span>
                            <span class="meta-value" id="metaSpan">—</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">政权/势力</span>
                            <span class="meta-value" id="metaCount">—</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">地图编号</span>
                            <span class="meta-value" id="metaIndex">— / 58</span>
                        </div>
                    </div>
                </div>

                <div class="info-section">
                    <div class="section-title">典藏位置</div>
                    <div class="file-path-box" id="filePath">maps/...</div>
                </div>
            </div>

            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← 前朝</button>
                <button class="nav-btn" id="nextBtn" onclick="navigate(1)" disabled>后世 →</button>
            </div>

            <div class="footer-quote" id="footerQuote">
                "江山留胜迹，我辈复登临" —— 孟浩然
            </div>
        </div>
    </div>

        // 历史数据与名言库
        const historyData = [

            { year: "新石器", name: "中国原始农耕时代主要遗址分布图", era: "史前时期", path: "maps/prehistoric/neolithic_farming.png", span: "约1万年前-4000年前", count: "数千处", desc: "呈现仰韶文化、龙山文化等新石器时代农耕遗址的地理分布，农业文明开始点燃华夏大地。", quote: "民以食为天", quoteAuthor: "—— 《汉书·郦食其传》" },
            { year: "前1850年", name: "夏朝疆域图", era: "早期国家", path: "maps/ancient/xia_1850bc.png", span: "约前2070-前1600年", count: "1个", desc: "中国史书记载的第一个世袭制王朝，统治中心位于黄河中游，标志着中国早期国家形态的形成。", quote: "大道之行也，天下为公", quoteAuthor: "—— 《礼记·礼运》" },
            { year: "前1400年", name: "商朝疆域图", era: "早期国家", path: "maps/ancient/shang_1400bc.png", span: "约前1600-前1046年", count: "1个", desc: "中国第一个有直接文字记载的王朝，青铜文明高度发达，统治范围较夏朝显著扩大。", quote: "殷鉴不远", quoteAuthor: "—— 《诗经·大雅·荡》" },
            { year: "前950年", name: "西周疆域图", era: "早期国家", path: "maps/ancient/western_zhou_950bc.png", span: "前1046-前771年", count: "1个", desc: "实行分封制和宗法制，建立了较为完备的政治制度，统治范围覆盖黄河流域和长江流域部分地区。", quote: "普天之下，莫非王土", quoteAuthor: "—— 《诗经·小雅·北山》" },
            { year: "前600年", name: "战国形势图（一）", era: "早期国家", path: "maps/ancient/warring_states_600bc.png", span: "前475-前221年", count: "7个主要", desc: "春秋战国时期，诸侯争霸，齐、楚、燕、韩、赵、魏、秦七雄并立，社会剧烈变革。", quote: "天下兴亡，匹夫有责", quoteAuthor: "—— 顾炎武" },
            { year: "前296年", name: "战国形势图（二）", era: "早期国家", path: "maps/ancient/warring_states_296bc.png", span: "前475-前221年", count: "7个主要", desc: "战国后期，秦国经过商鞅变法日益强大，开始统一六国的进程，中央集权制度逐步形成。", quote: "变法图强", quoteAuthor: "—— 《史记·商君列传》" },
            { year: "前214年", name: "秦朝疆域图", era: "帝国形成", path: "maps/empire/qin_214bc.png", span: "前221-前206年", count: "1个", desc: "中国历史上第一个大一统中央集权帝国，统一文字、货币、度量衡，修筑长城，疆域东至大海，西达陇西。", quote: "千古一帝", quoteAuthor: "—— 李贽《藏书》" },
            { year: "前207年", name: "刘邦破咸阳形势图", era: "帝国形成", path: "maps/empire/liu_bang_207bc.png", span: "秦末", count: "多路义军", desc: "秦末农民起义，刘邦率军攻入咸阳，秦朝灭亡，楚汉争霸的序幕拉开。", quote: "大风起兮云飞扬", quoteAuthor: "—— 刘邦《大风歌》" },
            { year: "前206年", name: "项羽分封形势图", era: "帝国形成", path: "maps/empire/xiang_yu_206bc.png", span: "秦末汉初", count: "18个诸侯", desc: "项羽自立为西楚霸王，分封十八路诸侯，恢复了战国时期的割据局面，为楚汉战争埋下伏笔。", quote: "力拔山兮气盖世", quoteAuthor: "—— 项羽《垓下歌》" },
            { year: "前50年", name: "西汉疆域图", era: "帝国形成", path: "maps/empire/western_han_50bc.png", span: "前206-8年", count: "1个", desc: "汉武帝时期疆域达到极盛，东并朝鲜，南吞百越，西征大宛，北破匈奴，丝绸之路开通。", quote: "犯强汉者，虽远必诛", quoteAuthor: "—— 陈汤" },
            { year: "12年", name: "新莽政权形势图", era: "帝国形成", path: "maps/empire/xin_mang_12ad.png", span: "8-23年", count: "1个", desc: "王莽篡汉建立新朝，推行托古改制，引发社会动荡，各地起义频发。", quote: "托古改制", quoteAuthor: "—— 《汉书·王莽传》" },
            { year: "23年", name: "玄汉形势图", era: "帝国形成", path: "maps/empire/xuan_han_23ad.png", span: "23-25年", count: "1个", desc: "绿林军拥立刘玄为帝，建立更始政权，短暂恢复汉室统治，但很快灭亡。", quote: "人心思汉", quoteAuthor: "—— 《后汉书》" },
            { year: "102年", name: "东汉疆域图", era: "帝国形成", path: "maps/empire/eastern_han_102ad.png", span: "25-220年", count: "1个", desc: "光武帝刘秀重建汉朝，定都洛阳，西域都护府恢复，班超经营西域，国力逐渐恢复。", quote: "光武中兴", quoteAuthor: "—— 《后汉书》" },
            { year: "196年", name: "汉末军阀割据形势图", era: "帝国形成", path: "maps/empire/warlords_196ad.png", span: "东汉末年", count: "多个军阀", desc: "黄巾起义后，董卓之乱，各地军阀割据，曹操挟天子以令诸侯，三国鼎立局面逐渐形成。", quote: "对酒当歌，人生几何", quoteAuthor: "—— 曹操《短歌行》" },
            { year: "260年", name: "三国形势图", era: "帝国形成", path: "maps/empire/three_kingdoms_260ad.png", span: "220-280年", count: "3个", desc: "魏蜀吴三国鼎立，曹操据中原，刘备占巴蜀，孙权据江东，形成相对稳定的割据局面。", quote: "天下三分", quoteAuthor: "—— 陈寿《三国志》" },
            { year: "281年", name: "西晋疆域图", era: "帝国形成", path: "maps/empire/western_jin_281ad.png", span: "266-316年", count: "1个", desc: "司马炎代魏建晋，灭吴统一全国，但统一局面短暂，八王之乱后迅速衰落。", quote: "三分归晋", quoteAuthor: "—— 《三国演义》" },
            { year: "327年", name: "东晋十六国形势图（一）", era: "帝国形成", path: "maps/empire/sixteen_kingdoms_327ad.png", span: "317-420年", count: "20余个", desc: "晋室南迁建立东晋，北方陷入五胡十六国的混乱局面，民族大融合与冲突并存。", quote: "衣冠南渡", quoteAuthor: "—— 《晋书》" },
            { year: "380年", name: "东晋前秦形势图", era: "帝国形成", path: "maps/empire/former_qin_380ad.png", span: "前秦时期", count: "1个主导", desc: "前秦苻坚统一北方，国力强盛，发动淝水之战试图统一全国，但最终失败。", quote: "投鞭断流", quoteAuthor: "—— 《晋书·苻坚载记》" },
            { year: "417年", name: "东晋十六国形势图（二）", era: "帝国形成", path: "maps/empire/sixteen_kingdoms_417ad.png", span: "317-420年", count: "多个", desc: "淝水之战后北方再次分裂，刘裕北伐收复长安、洛阳，东晋版图达到最大。", quote: "旧时王谢堂前燕", quoteAuthor: "—— 刘禹锡《乌衣巷》" },
            { year: "450年", name: "宋、北魏形势图（一）", era: "帝国形成", path: "maps/empire/song_wei_450ad.png", span: "南北朝", count: "2个主要", desc: "南朝宋与北朝北魏对峙，南北朝时期开始，南北经济文化差异逐渐明显。", quote: "南朝四百八十寺", quoteAuthor: "—— 杜牧《江南春》" },
            { year: "473年", name: "宋、北魏形势图（二）", era: "帝国形成", path: "maps/empire/song_wei_473ad.png", span: "南北朝", count: "2个主要", desc: "北魏孝文帝改革前夜，北方民族融合加速，为后来的统一奠定基础。", quote: "胡汉交融", quoteAuthor: "—— 《魏书》" },
            { year: "497年", name: "齐、东魏西魏形势图", era: "帝国形成", path: "maps/empire/qi_wei_497ad.png", span: "南北朝", count: "3个", desc: "南朝齐与北朝分裂后的东魏、西魏对峙，北魏分裂为东西两部，关中与关东对立。", quote: "关陇集团", quoteAuthor: "—— 陈寅恪" },
            { year: "540年", name: "梁、东魏西魏形势图", era: "帝国形成", path: "maps/empire/liang_wei_540ad.png", span: "南北朝", count: "3个", desc: "南朝梁与东魏、西魏对峙，侯景之乱前夜，南方经济文化达到高峰。", quote: "南朝金粉", quoteAuthor: "—— 《南史》" },
            { year: "550年", name: "侯景之乱形势图", era: "帝国形成", path: "maps/empire/hou_jing_550ad.png", span: "548-552年", count: "混乱", desc: "侯景叛乱攻破建康，江南地区遭到严重破坏，南朝从此衰落，南北力量对比逆转。", quote: "千里烟绝", quoteAuthor: "—— 《南史·侯景传》" },
            { year: "566年", name: "陈、北齐北周形势图", era: "帝国形成", path: "maps/empire/chen_northern_566ad.png", span: "南北朝末期", count: "3个", desc: "南朝最后一个王朝陈与北朝北齐、北周对峙，北周逐渐强大，为隋朝统一奠定基础。", quote: "后庭花", quoteAuthor: "—— 杜牧《泊秦淮》" },
            { year: "583年", name: "隋、陈形势图", era: "成熟帝国", path: "maps/medieval/sui_chen_583ad.png", span: "581-589年", count: "2个", desc: "隋朝建立后积极准备灭陈，开凿大运河，统一的条件日趋成熟。", quote: " Transitio imperii ", quoteAuthor: "—— 政权交替" },
            { year: "605年", name: "隋朝疆域图（一）", era: "成熟帝国", path: "maps/medieval/sui_605ad.png", span: "581-618年", count: "1个", desc: "隋文帝统一全国，结束近300年分裂局面，开创开皇之治，疆域辽阔。", quote: "开皇之治", quoteAuthor: "—— 《隋书》" },
            { year: "612年", name: "隋朝疆域图（二）", era: "成熟帝国", path: "maps/medieval/sui_612ad.png", span: "581-618年", count: "1个", desc: "隋炀帝时期，大运河贯通，但三征高句丽导致国力耗尽，隋末农民起义爆发。", quote: "尽道隋亡为此河", quoteAuthor: "—— 皮日休《汴河怀古》" },
            { year: "669年", name: "唐朝疆域图（一）", era: "成熟帝国", path: "maps/medieval/tang_669ad.png", span: "618-907年", count: "1个", desc: "唐高宗时期，唐朝疆域达到极盛，东起朝鲜半岛，西达咸海，北包贝加尔湖，南至越南中部。", quote: "天可汗", quoteAuthor: "—— 四夷君长尊号" },
            { year: "703年", name: "唐朝疆域图（二）", era: "成熟帝国", path: "maps/medieval/tang_703ad.png", span: "武则天时期", count: "1个", desc: "武则天称帝改国号为周，唐朝疆域保持稳定，政治中心东移洛阳。", quote: "政启开元，治宏贞观", quoteAuthor: "—— 郭沫若" },
            { year: "750年", name: "唐朝疆域图（三）", era: "成熟帝国", path: "maps/medieval/tang_750ad.png", span: "唐玄宗时期", count: "1个", desc: "开元盛世，唐朝国力达到顶峰，长安成为国际性大都市，丝绸之路繁荣。", quote: "忆昔开元全盛日", quoteAuthor: "—— 杜甫《忆昔》" },
            { year: "783年", name: "唐朝疆域图（四）", era: "成熟帝国", path: "maps/medieval/tang_783ad.png", span: "安史之乱后", count: "1个", desc: "安史之乱后，唐朝由盛转衰，藩镇割据开始，西域逐渐丧失。", quote: "国破山河在", quoteAuthor: "—— 杜甫《春望》" },
            { year: "866年", name: "唐朝疆域图（五）", era: "成熟帝国", path: "maps/medieval/tang_866ad.png", span: "晚唐", count: "1个", desc: "晚唐时期，藩镇割据加剧，黄巢起义动摇国本，唐朝名存实亡。", quote: "满城尽带黄金甲", quoteAuthor: "—— 黄巢《不第后赋菊》" },
            { year: "910年", name: "五代十国形势图（一）", era: "成熟帝国", path: "maps/medieval/five_dynasties_910ad.png", span: "907-979年", count: "多个", desc: "唐朝灭亡后，中原相继出现后梁、后唐、后晋、后汉、后周五个短命王朝，南方出现十个割据政权。", quote: "五代更迭", quoteAuthor: "—— 《新五代史》" },
            { year: "926年", name: "五代十国形势图（二）", era: "成熟帝国", path: "maps/medieval/five_dynasties_926ad.png", span: "907-979年", count: "多个", desc: "后唐庄宗时期，五代十国格局相对稳定，北方战乱频繁，南方相对安定。", quote: "风流总被雨打风吹去", quoteAuthor: "—— 辛弃疾" },
            { year: "939年", name: "五代十国形势图（三）", era: "成熟帝国", path: "maps/medieval/five_dynasties_939ad.png", span: "907-979年", count: "多个", desc: "后晋石敬瑭割让燕云十六州给契丹，北方边防屏障丧失，影响深远。", quote: "儿皇帝", quoteAuthor: "—— 《新五代史·晋本纪》" },
            { year: "948年", name: "五代十国形势图（四）", era: "成熟帝国", path: "maps/medieval/five_dynasties_948ad.png", span: "907-979年", count: "多个", desc: "后汉时期，郭威崛起，五代即将结束，统一的趋势日益明显。", quote: "乱世出英雄", quoteAuthor: "—— 《三国演义》" },
            { year: "959年", name: "五代十国形势图（五）", era: "成熟帝国", path: "maps/medieval/five_dynasties_959ad.png", span: "907-979年", count: "多个", desc: "后周世宗柴荣改革，为北宋统一奠定基础，五代十国接近尾声。", quote: "十年开拓天下", quoteAuthor: "—— 柴荣" },
            { year: "979年", name: "辽、北宋形势图", era: "成熟帝国", path: "maps/medieval/liao_song_979ad.png", span: "北宋初期", count: "2个主要", desc: "北宋基本统一全国，但未能收复燕云十六州，与辽形成南北对峙。", quote: "先南后北", quoteAuthor: "—— 赵匡胤统一战略" },
            { year: "1110年", name: "辽西夏北宋形势图", era: "成熟帝国", path: "maps/medieval/liao_xia_song_1110ad.png", span: "北宋中期", count: "3个", desc: "辽、北宋、西夏三足鼎立，北宋与西夏战争频繁，向辽缴纳岁币维持和平。", quote: "澶渊之盟", quoteAuthor: "—— 宋辽和约" },
            { year: "1170年", name: "金西夏南宋形势图（一）", era: "成熟帝国", path: "maps/medieval/jin_xia_song_1170ad.png", span: "南宋初期", count: "3个", desc: "金灭辽和北宋，南宋建立，宋金对峙，淮河成为南北分界线。", quote: "靖康耻，犹未雪", quoteAuthor: "—— 岳飞《满江红》" },
            { year: "1206年", name: "金西夏南宋形势图（二）", era: "成熟帝国", path: "maps/medieval/jin_xia_song_1206ad.png", span: "南宋中期", count: "3个", desc: "成吉思汗统一蒙古，金朝衰落，南宋偏安江南，三国力量对比即将剧变。", quote: "一代天骄", quoteAuthor: "—— 毛泽东《沁园春·雪》" },
            { year: "1280年", name: "元朝疆域图（一）", era: "成熟帝国", path: "maps/medieval/yuan_1280ad.png", span: "元朝初期", count: "1个", desc: "元朝统一全国，疆域空前辽阔，建立行省制度，西藏正式纳入中央管辖。", quote: "北逾阴山，西极流沙", quoteAuthor: "—— 《元史·地理志》" },
            { year: "1331年", name: "元朝疆域图（二）", era: "成熟帝国", path: "maps/medieval/yuan_1331ad.png", span: "元朝中后期", count: "1个", desc: "元朝中后期，政治腐败，民族矛盾尖锐，农民起义此起彼伏，元朝统治摇摇欲坠。", quote: "石人一只眼", quoteAuthor: "—— 元末民谣" },
            { year: "1410年", name: "明朝疆域图（一）", era: "传统社会", path: "maps/late_imperial/ming_1410ad.png", span: "明朝初期", count: "1个", desc: "明成祖永乐时期，迁都北京，郑和下西洋，明朝国力达到高峰，疆域包括安南。", quote: "天子守国门", quoteAuthor: "—— 永乐迁都" },
            { year: "1533年", name: "明朝疆域图（二）", era: "传统社会", path: "maps/late_imperial/ming_1533ad.png", span: "明朝中期", count: "1个", desc: "嘉靖年间，明朝疆域收缩，北方蒙古威胁，东南倭寇侵扰，海禁政策实施。", quote: "倭寇之患", quoteAuthor: "—— 《明史》" },
            { year: "1628年", name: "明朝疆域图（三）", era: "传统社会", path: "maps/late_imperial/ming_1628ad.png", span: "明朝末年", count: "1个", desc: "崇祯元年，明朝内忧外患，李自成、张献忠起义，后金崛起于东北，明朝灭亡在即。", quote: "君王死社稷", quoteAuthor: "—— 崇祯自缢煤山" },
            { year: "1760年", name: "清朝疆域图（一）", era: "传统社会", path: "maps/late_imperial/qing_1760ad.png", span: "清朝中期", count: "1个", desc: "乾隆时期，清朝疆域达到极盛，平定准噶尔，统一新疆，疆域西跨葱岭，北接西伯利亚。", quote: "十全武功", quoteAuthor: "—— 乾隆自诩" },
            { year: "1836年", name: "清朝疆域图（二）", era: "传统社会", path: "maps/late_imperial/qing_1836ad.png", span: "清朝晚期", count: "1个", desc: "鸦片战争前夜，清朝由盛转衰，西方列强开始侵略，中国逐步沦为半殖民地。", quote: "三千年未有之大变局", quoteAuthor: "—— 李鸿章" },
            { year: "1898年", name: "列强划分势力范围示意图", era: "中国近代", path: "maps/modern/spheres_1898ad.png", span: "晚清", count: "多个列强", desc: "甲午战争后，列强瓜分中国狂潮，德国占胶州湾，俄国租旅顺大连，英国租威海卫、香港新界。", quote: "瓜分豆剖", quoteAuthor: "—— 康有为" },
            { year: "1908年", name: "清朝疆域图", era: "中国近代", path: "maps/modern/qing_1908ad.png", span: "清末", count: "1个", desc: "清末新政时期，清朝疆域大幅收缩，边疆危机严重，但仍是名义上的统一帝国。", quote: "量中华之物力", quoteAuthor: "—— 慈禧太后" },
            { year: "1913年", name: "中华民国(北洋政府)形势图", era: "中国近代", path: "maps/modern/republic_1913ad.png", span: "民国初期", count: "1个名义", desc: "辛亥革命后，北洋政府统治，军阀割据开始，袁世凯称帝失败，中国陷入分裂。", quote: "革命尚未成功", quoteAuthor: "—— 孙中山" },
            { year: "1937年", name: "中华民国(国民政府)形势图（一）", era: "中国近代", path: "maps/modern/republic_1937ad.png", span: "抗战前", count: "1个名义", desc: "南京国民政府形式统一全国，但中共建立苏区，日本侵占东北，国共内战与民族危机并存。", quote: "一寸山河一寸血", quoteAuthor: "—— 抗战名言" },
            { year: "1946年", name: "中华民国(国民政府)形势图（二）", era: "中国近代", path: "maps/modern/republic_1946ad.png", span: "抗战后", count: "1个名义", desc: "抗战胜利后，国共矛盾激化，内战全面爆发，解放区迅速扩大。", quote: "天翻地覆慨而慷", quoteAuthor: "—— 毛泽东《七律》" },
            { year: "1949年", name: "中华民国(国民政府)形势图（三）", era: "中国近代", path: "maps/modern/republic_1949_09ad.png", span: "新中国成立前", count: "1个", desc: "渡江战役后，国民党退守台湾，中华人民共和国成立前夕的版图。", quote: "雄鸡一唱天下白", quoteAuthor: "—— 毛泽东《浣溪沙》" },
            { year: "1966年", name: "中华人民共和国（一）", era: "中国现代", path: "maps/contemporary/prc_1966ad.png", span: "文革前", count: "1个", desc: "新中国成立初期，完成社会主义改造，疆域基本稳定，但面临国际封锁。", quote: "独立自主", quoteAuthor: "—— 建国方针" },
            { year: "2025年", name: "中华人民共和国（二）", era: "中国现代", path: "maps/contemporary/prc_2025ad.png", span: "当代", count: "1个", desc: "当代中国，改革开放后经济快速发展，成为世界第二大经济体，疆域包括台湾待统一。", quote: "实现中华民族伟大复兴", quoteAuthor: "—— 中国梦" }
        ];

        // 通用名言库（随机显示）
        const generalQuotes = [
            { text: "究天人之际，通古今之变", author: "司马迁" },
            { text: "以史为鉴，可以知兴替", author: "唐太宗" },
            { text: "读史使人明智", author: "培根" },
            { text: "前事不忘，后事之师", author: "《战国策》" },
            { text: "史者，所以明夫治天下之道也", author: "曾巩" },
            { text: "欲知大道，必先为史", author: "龚自珍" },
            { text: "灭人之国，必先去其史", author: "龚自珍" },
            { text: "历史是最好的教科书", author: "习近平" }
        ];

        let currentIndex = -1;
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;

        const mapViewport = document.getElementById('mapViewport');
        const mapWrapper = document.getElementById('mapWrapper');
        const mapImage = document.getElementById('mapImage');
        const zoomLevelDisplay = document.getElementById('zoomLevel');
        const placeholder = document.getElementById('placeholder');

        // 初始化时间轴
        function initTimeline() {
            const list = document.getElementById('timelineList');
            let currentEra = '';

            historyData.forEach((item, index) => {
                if (item.era !== currentEra) {
                    currentEra = item.era;
                    const eraDiv = document.createElement('div');
                    eraDiv.className = 'era-label';
                    eraDiv.innerHTML = `
                        <span>${currentEra}</span>
                        <span class="era-quote">${getEraQuote(currentEra)}</span>
                    `;
                    list.appendChild(eraDiv);
                }

                const div = document.createElement('div');
                div.className = 'timeline-item';
                div.innerHTML = `
                    <span class="year-badge">${item.year}</span>
                    <span class="item-name">${item.name}</span>
                `;
                div.onclick = () => selectMap(index);
                list.appendChild(div);
            });
        }

        function getEraQuote(era) {
            const quotes = {
                "史前时期": "文明之火",
                "早期国家": "华夏初立",
                "帝国形成": "大一统",
                "成熟帝国": "盛世华章",
                "传统社会": "治乱兴衰",
                "中国近代": "救亡图存",
                "中国现代": "复兴之路"
            };
            return quotes[era] || "";
        }

        // 选择地图
        function selectMap(index) {
            if (index < 0 || index >= historyData.length) return;

            currentIndex = index;
            const data = historyData[index];

            // 更新列表激活状态
            document.querySelectorAll('.timeline-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
                if (i === index) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            // 更新信息面板
            updateInfoPanel(data, index);

            // 更新各处名言
            updateQuotes(data);

            // 加载图片
            loadImage(data.path);

            // 更新按钮状态
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === historyData.length - 1;
        }

        function updateInfoPanel(data, index) {
            const yearEl = document.getElementById('currentYear');
            yearEl.textContent = data.year;
            yearEl.className = 'current-year' + (data.year.includes('前') ? ' bc' : '');

            document.getElementById('currentTitle').textContent = data.name;
            document.getElementById('eraDesc').textContent = data.desc;
            document.getElementById('metaEra').textContent = data.era;
            document.getElementById('metaSpan').textContent = data.span;
            document.getElementById('metaCount').textContent = data.count;
            document.getElementById('metaIndex').textContent = `${index + 1} / ${historyData.length}`;
            document.getElementById('filePath').textContent = data.path;
        }

        function updateQuotes(data) {
            // 更新顶部名言
            const headerQuote = document.getElementById('headerQuote');
            if (data.quote) {
                headerQuote.innerHTML = `
                    <div>"${data.quote}"</div>
                    <div class="header-quote-author">${data.quoteAuthor}</div>
                `;
            }

            // 更新智慧名言
            const wisdomQuote = document.getElementById('wisdomQuote');
            if (data.quote) {
                wisdomQuote.innerHTML = `
                    "${data.quote}"
                    <div class="wisdom-author">${data.quoteAuthor}</div>
                `;
            }

            // 随机更新侧边栏名言
            const sidebarQuote = document.getElementById('sidebarQuote');
            const randomQuote = generalQuotes[Math.floor(Math.random() * generalQuotes.length)];
            sidebarQuote.innerHTML = `
                <div>"${randomQuote.text}"</div>
                <div class="quote-author">—— ${randomQuote.author}</div>
            `;

            // 更新底部名言
            const footerQuotes = [
                "江山留胜迹，我辈复登临 —— 孟浩然",
                "人事有代谢，往来成古今 —— 孟浩然",
                "旧时王谢堂前燕，飞入寻常百姓家 —— 刘禹锡",
                "念天地之悠悠，独怆然而涕下 —— 陈子昂",
                "兴，百姓苦；亡，百姓苦 —— 张养浩"
            ];
            document.getElementById('footerQuote').textContent = footerQuotes[Math.floor(Math.random() * footerQuotes.length)];
        }

        function loadImage(path) {
            placeholder.style.display = 'none';
            mapImage.classList.remove('loaded');

            const currentTransform = mapWrapper.style.transform;

            mapImage.src = path;

            mapImage.onload = function() {
                mapImage.classList.add('loaded');
                mapWrapper.style.transform = currentTransform || `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
            };

            mapImage.onerror = function() {
                mapImage.classList.remove('loaded');
                placeholder.style.display = 'block';
                placeholder.innerHTML = `
                    <div class="placeholder-icon">📁</div>
                    <div class="welcome-text">昭燃的历史地图馆</div>
                    <div style="color: var(--text-muted); margin-top: 10px;">
                        请将图片放置于：<br>
                        <span style="color: var(--gold);">${path}</span>
                    </div>
                `;
                resetView();
            };
        }

        // 缩放功能
        function zoomIn() {
            scale = Math.min(scale * 1.2, 5);
            updateTransform();
        }

        function zoomOut() {
            scale = Math.max(scale / 1.2, 0.2);
            updateTransform();
        }

        function resetView() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        function fitToScreen() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        function updateTransform() {
            mapWrapper.style.transform = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
            zoomLevelDisplay.textContent = Math.round(scale * 100) + '%';
        }

        // 鼠标拖拽
        mapViewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('.toolbar')) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            mapViewport.classList.add('grabbing');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            mapViewport.classList.remove('grabbing');
        });

        // 滚轮缩放
        mapViewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.2, Math.min(5, scale * delta));
            updateTransform();
        });

        // 触摸支持
        let lastTouchDistance = 0;

        mapViewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                lastTouchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            } else if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            }
        });

        mapViewport.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 2) {
                const distance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                if (lastTouchDistance > 0) {
                    scale = Math.max(0.2, Math.min(5, scale * (distance / lastTouchDistance)));
                    updateTransform();
                }
                lastTouchDistance = distance;
            } else if (e.touches.length === 1 && isDragging) {
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateTransform();
            }
        });

        mapViewport.addEventListener('touchend', () => {
            isDragging = false;
            lastTouchDistance = 0;
        });

        // 导航
        function navigate(direction) {
            selectMap(currentIndex + direction);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
            if (e.key === 'ArrowUp') { e.preventDefault(); zoomIn(); }
            if (e.key === 'ArrowDown') { e.preventDefault(); zoomOut(); }
            if (e.key === '0') resetView();
        });

        // 初始化
        initTimeline();
    </script>
</body>
</html>
